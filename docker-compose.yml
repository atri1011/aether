services:
  aether:
    build: .
    image: aether:latest
    container_name: aether
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8787
      - CACHE_DIR=/app/.cache/aether
      - AUTH_SECURE_COOKIE=1
    volumes:
      - aether-cache:/app/.cache/aether
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  aether-cache:
